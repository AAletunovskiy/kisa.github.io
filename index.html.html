<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Я и дальше буду говорить, что люблю</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: Georgia, "Times New Roman", serif;
      color: #fff;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.18), transparent 24%),
        radial-gradient(circle at 80% 75%, rgba(255,200,220,0.28), transparent 28%),
        linear-gradient(135deg, #7d294f, #c75b7d 48%, #efb7c8);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 420px;
      height: 420px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 50%;
      animation: float 8s ease-in-out infinite;
    }

    body::before {
      top: -180px;
      right: -120px;
    }

    body::after {
      bottom: -230px;
      left: -130px;
      animation-delay: -4s;
    }

    .card {
      position: relative;
      width: min(880px, calc(100% - 36px));
      padding: 64px 48px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 32px;
      background: rgba(80, 20, 45, 0.25);
      box-shadow: 0 30px 80px rgba(70, 10, 35, 0.35);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      animation: appear 1.2s ease both;
    }

    .small {
      margin: 0 0 24px;
      font-family: Arial, sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      opacity: 0.75;
    }

    h1 {
      max-width: 720px;
      margin: 0 auto;
      font-size: clamp(42px, 7vw, 82px);
      line-height: 0.98;
      font-weight: 500;
      letter-spacing: -0.04em;
      text-wrap: balance;
    }

    .line {
      width: 72px;
      height: 1px;
      margin: 38px auto;
      background: rgba(255,255,255,0.65);
    }

    .apology {
      margin: 0;
      font-family: Arial, sans-serif;
      font-size: clamp(18px, 3vw, 27px);
      line-height: 1.45;
      font-weight: 400;
    }

    .rabbit {
      display: inline-block;
      margin-left: 8px;
      animation: hop 1.8s ease-in-out infinite;
      transform-origin: bottom center;
    }

    @keyframes appear {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes hop {
      0%, 100% { transform: translateY(0) rotate(0); }
      45% { transform: translateY(-8px) rotate(-5deg); }
      60% { transform: translateY(0) rotate(4deg); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(24px); }
    }

    @media (max-width: 600px) {
      .card {
        padding: 48px 24px;
        border-radius: 24px;
      }

      .small {
        letter-spacing: 0.18em;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <p class="small"> конечно, иногда ты Павел Техник </p>

    <h1> Но я и дальше буду говорить, что люблю</h1>

    <div class="line"></div>

    <p class="apology">
      В конце-концов я вообще идиотище
      <span class="rabbit" aria-label="кролик">🐇</span>
    </p>
  </main>
</body>
</html>
